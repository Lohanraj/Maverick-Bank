<div class="container mt-5">

  <div class="card shadow p-4">

    <h2 class="text-danger mb-4">
      Withdraw Money
    </h2>

    <div class="mb-3">

      <label class="form-label">
        Amount
      </label>

      <input
        type="number"
        class="form-control"
        [(ngModel)]="amount"
        placeholder="Enter amount">

    </div>

    <button
      class="btn btn-danger w-100"
      (click)="withdraw()">

      Withdraw Money

    </button>

  </div>

</div>
