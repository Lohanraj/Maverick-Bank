name: Maverick Bank CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. Build and Test Backend (.NET Web API)
  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore NuGet Packages
      run: dotnet restore

    - name: Build Backend
      run: dotnet build --no-restore --configuration Release

    - name: Run Unit Tests
      run: dotnet test --no-build --configuration Release --verbosity normal

  # 2. Build and Lint Frontend (Vite + React)
  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: Frontend/package-lock.json

    - name: Install Frontend Dependencies
      run: npm install

    - name: Compile & Build Frontend
      run: npm run build

  # 3. Verify Docker Image Compilation
  docker-ci-check:
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: actions/setup-buildx-action@v3

    - name: Validate Backend Dockerfile
      run: |
        docker build -t maverick-bank-api:test -f Backend/MaverickBank.API/Dockerfile Backend

    - name: Validate Frontend Dockerfile
      run: |
        docker build -t maverick-bank-ui:test -f Frontend/Dockerfile Frontend
